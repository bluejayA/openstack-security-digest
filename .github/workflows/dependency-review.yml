name: Dependency Review

# Free on public repositories. Blocks PRs that introduce dependencies with
# known vulnerabilities.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Skipped for Dependabot PRs, whose read-only token can't reach the
  # Dependency Review API (the action then reports a misleading "not supported
  # on this repository" error). Runs normally on all other PRs.
  review:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
