name: CI / server

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/ci-server.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/ci-server.yml"

permissions:
  contents: read

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Build with the latest stable toolchain so the standard library is
          # security-patched (govulncheck reports stdlib CVEs otherwise).
          go-version: stable
          check-latest: true
          cache-dependency-path: server/go.sum
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (race detector)
        # -race needs cgo; bump the timeout since the detector slows tests ~5-10x.
        env:
          CGO_ENABLED: "1"
        run: go test -race -timeout 5m ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
          cache-dependency-path: server/go.sum
      - name: golangci-lint
        # v8 of the action drives golangci-lint v2 (the v2 binary uses the new
        # config schema; the issue's @v6 reference predates v2). It manages its
        # own result cache, so no separate Go build cache step is needed.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: server
