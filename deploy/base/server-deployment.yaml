apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  labels:
    app.kubernetes.io/component: server
spec:
  # Single replica: SQLite is a single-file DB and the scheduler must be a
  # singleton (multiple schedulers → duplicate Slack pushes). Recreate (not
  # RollingUpdate) ensures the old pod releases the volume before the new one
  # mounts it.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/component: server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532 # distroless "nonroot"
        runAsGroup: 65532
        fsGroup: 65532 # make the PVC writable by the non-root user
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: oss-digest-server:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ADDR
              value: ":8080"
            - name: DB_PATH
              value: /data/digest.db
            - name: FEED_URL
              value: https://stackers.network/feed.xml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: server-data
        - name: tmp
          emptyDir: {}
