apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oss-digest
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "false"
spec:
  ingressClassName: nginx
  rules:
    # Host-less: matches any host (suitable for local). A production overlay
    # should add `host:` and TLS.
    - http:
        paths:
          # API and health route to the Go server …
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 8080
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: server
                port:
                  number: 8080
          # … everything else to the Next.js frontend.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
